run:
  concurrency: 4
  timeout: 10m
  issues-exit-code: 1
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - unused
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt
        - io/ioutil
        - io
  exclusions:
    rules:
      # gosimple checks (S10xx) are now part of staticcheck in v2
      - linters:
          - staticcheck
        text: "S(1002|1008|1021)"
      # Exclude failing staticchecks for now
      - linters:
          - staticcheck
        text: "SA(1006|1019|4006|4010|4017|5007|6005|9004):"
      # Exclude lll issues for long lines with go:generate
      - linters:
          - lll
        source: "^//go:generate "
      - linters:
          - errcheck
        path: ".*_test.go"
    paths:
      - ".*\\.hcl2spec\\.go$"
    max-issues-per-linter: 0
    max-same-issues: 0

formatters:
  enable:
    - goimports

output:
  formats:
    - format: colored-line-number
